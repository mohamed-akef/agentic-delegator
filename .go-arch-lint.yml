# .go-arch-lint.yml — enforces Clean Architecture dependency rule.

version: 3
workdir: .
allow:
  depOnAnyVendor: true
  deepScan: true

excludeFiles:
  - "^.*_test\\.go$"

components:
  domain:
    in: core/domain/**
  ports:
    in: core/usecase/ports/**
  usecase:
    in: core/usecase
  testutil:
    in: core/testutil/**
  adapter_clock:
    in: core/adapter/clock/**
  adapter_idgen:
    in: core/adapter/idgen/**
  adapter_crypto:
    in: core/adapter/crypto/**
  adapter_webhook:
    in: core/adapter/webhook/**
  adapter_postgres:
    in: core/adapter/postgres/**
  adapter_postgres_selfhost:
    in: core/adapter/postgres/selfhost/**
  adapter_docker:
    in: core/adapter/docker/**
  adapter_http:
    in: core/adapter/http
  adapter_http_gen:
    in: core/adapter/http/gen
  runtime:
    in: core/runtime/**
  runtime_selfhost:
    in: core/runtime/selfhost/**
  presenter:
    in: core/presenter/**
  config:
    in: core/config/**
  cmd:
    in: cmd/**

deps:
  domain:
    anyProjectDeps: false
    anyVendorDeps: true

  ports:
    mayDependOn:
      - domain
    anyVendorDeps: true

  usecase:
    mayDependOn:
      - domain
      - ports
    anyVendorDeps: true

  testutil:
    mayDependOn:
      - domain
      - ports
    anyVendorDeps: true

  # All adapters may use domain + ports + (eventually) usecase. They may NOT
  # depend on other adapters — that's the SRP boundary; composition happens
  # in cmd/*.
  adapter_clock:
    mayDependOn: [domain, ports]
    anyVendorDeps: true
  adapter_idgen:
    mayDependOn: [domain, ports]
    anyVendorDeps: true
  adapter_crypto:
    mayDependOn: [domain, ports]
    anyVendorDeps: true
  adapter_webhook:
    mayDependOn: [domain, ports]
    anyVendorDeps: true
  adapter_postgres:
    mayDependOn: [domain, ports]
    anyVendorDeps: true
  adapter_postgres_selfhost:
    mayDependOn: [domain, ports, adapter_postgres, adapter_crypto, runtime_selfhost]
    anyVendorDeps: true
  adapter_docker:
    mayDependOn: [domain, ports]
    anyVendorDeps: true
  # http adapter may also call use cases (it's the inbound side)
  # adapter_http_gen is the oapi-codegen output; it receives injections from adapter_http
  adapter_http_gen:
    anyProjectDeps: true
    anyVendorDeps: true
  adapter_http:
    mayDependOn: [domain, ports, usecase, adapter_http_gen, presenter]
    anyVendorDeps: true
  runtime:
    mayDependOn: [domain, ports]
    anyVendorDeps: true
  runtime_selfhost:
    mayDependOn: [domain, ports, runtime, usecase]
    anyVendorDeps: true
  presenter:
    mayDependOn: [domain, presenter]
    anyVendorDeps: true
  config:
    mayDependOn: []
    anyProjectDeps: false
    anyVendorDeps: true
  # cmd is the composition root — may depend on all adapters and use cases
  cmd:
    mayDependOn: [domain, ports, usecase, adapter_clock, adapter_idgen, adapter_crypto, adapter_webhook, adapter_postgres, adapter_postgres_selfhost, adapter_docker, adapter_http, adapter_http_gen, runtime_selfhost, config]
    anyVendorDeps: true
