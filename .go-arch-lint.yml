# .go-arch-lint.yml — enforces Clean Architecture dependency rule.

version: 3
workdir: .
allow:
  depOnAnyVendor: true
  deepScan: true

excludeFiles:
  - "^.*_test\\.go$"

components:
  domain:
    in: core/domain/**
  ports:
    in: core/usecase/ports/**
  usecase:
    in: core/usecase
  testutil:
    in: core/testutil/**
  adapter_clock:
    in: core/adapter/clock/**
  adapter_idgen:
    in: core/adapter/idgen/**
  adapter_crypto:
    in: core/adapter/crypto/**
  adapter_webhook:
    in: core/adapter/webhook/**
  adapter_postgres:
    in: core/adapter/postgres/**
  adapter_docker:
    in: core/adapter/docker/**
  adapter_http:
    in: core/adapter/http/**
  cmd:
    in: cmd/**

deps:
  domain:
    anyProjectDeps: false
    anyVendorDeps: true

  ports:
    mayDependOn:
      - domain
    anyVendorDeps: true

  usecase:
    mayDependOn:
      - domain
      - ports
    anyVendorDeps: true

  testutil:
    mayDependOn:
      - domain
      - ports
    anyVendorDeps: true

  # All adapters may use domain + ports + (eventually) usecase. They may NOT
  # depend on other adapters — that's the SRP boundary; composition happens
  # in cmd/*.
  adapter_clock:
    mayDependOn: [domain, ports]
    anyVendorDeps: true
  adapter_idgen:
    mayDependOn: [domain, ports]
    anyVendorDeps: true
  adapter_crypto:
    mayDependOn: [domain, ports]
    anyVendorDeps: true
  adapter_webhook:
    mayDependOn: [domain, ports]
    anyVendorDeps: true
  adapter_postgres:
    mayDependOn: [domain, ports]
    anyVendorDeps: true
  adapter_docker:
    mayDependOn: [domain, ports]
    anyVendorDeps: true
  # http adapter may also call use cases (it's the inbound side)
  adapter_http:
    mayDependOn: [domain, ports, usecase]
    anyVendorDeps: true
  # cmd is the composition root — may depend on all adapters and use cases
  cmd:
    mayDependOn: [domain, ports, usecase, adapter_clock, adapter_idgen, adapter_crypto, adapter_webhook, adapter_postgres, adapter_docker, adapter_http]
    anyVendorDeps: true
