# arch-lint.yml — enforces Clean Architecture dependency rule.
# See https://github.com/fe3dback/go-arch-lint for syntax.

version: 3
workdir: .
allow:
  depOnAnyVendor: false
  deepScan: true

components:
  domain:
    in: core/domain/**
  ports:
    in: core/usecase/ports/**
  usecase:
    in: core/usecase
  testutil:
    in: core/testutil/**

deps:
  domain:
    mayDependOn: []  # domain depends on NOTHING inside the repo

  ports:
    mayDependOn:
      - domain

  usecase:
    mayDependOn:
      - domain
      - ports

  testutil:
    mayDependOn:
      - domain
      - ports
