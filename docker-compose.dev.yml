services:
  postgres:
    image: postgres:16-alpine
    container_name: agentic-delegator-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: delegator
      POSTGRES_PASSWORD: delegator
      POSTGRES_DB: delegator
    ports:
      - "127.0.0.1:5433:5432"   # host 5433 → container 5432, to avoid conflict with other dev DBs
    volumes:
      - delegator-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delegator -d delegator"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  delegator-pgdata:
